<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>배송 정보 확인 | Pre.p Mood</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout-system.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/page.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/checkout.css">
  <script defer src="utils.js"></script>
  <script defer src="catalog-data.js"></script>
  <script defer src="mini-cart.js"></script>
  <script defer src="header-loader.js"></script>
  <script defer src="header-scroll.js"></script>
  <script defer src="footer-loader.js"></script>
  <script defer src="checkout-review.js"></script>
</head>
<body>
  <!-- 공통 헤더 -->
  <div id="header-container"></div>

  <!-- 배송 정보 확인 페이지 (checkout.html과 동일: 브레드크럼 풀폭+밑줄, 배송 정보·주문 요약 같은 높이) -->
  <main class="checkout-page">
    <div class="checkout-container">
      <!-- 1행: 브레드크럼 — 좌·우 전체 너비, 밑줄로 구분 -->
      <div class="checkout-breadcrumb-row">
        <nav class="checkout-breadcrumb" aria-label="결제 단계">
          <a href="checkout.html" class="step step-current">1. 배송</a>
          <span class="separator" aria-hidden="true">&gt;</span>
          <span class="step step-disabled">2. 결제 방법</span>
          <span class="separator" aria-hidden="true">&gt;</span>
          <span class="step step-disabled">3. 주문 확인</span>
        </nav>
      </div>
      <!-- 좌측: 배송 정보·주문 상품 (밑줄 아래 배송 정보와 우측 주문 요약 같은 높이) -->
      <div class="checkout-form-section">
        <!-- 배송 정보 표시 -->
        <div class="form-section">
          <h2 class="section-title">배송 정보</h2>
          <div id="shipping-info-review">
            <!-- JavaScript로 동적 생성 -->
          </div>
          <div style="margin-top: 20px;">
            <a href="checkout.html" class="edit-link">수정</a>
          </div>
        </div>
        <!-- 확인 및 진행 버튼 -->
        <div class="checkout-actions">
          <button class="complete-order-btn" id="proceed-to-payment">확인 및 진행</button>
        </div>
      </div>

      <!-- 우측: 주문 요약 (checkout.html과 동일 구조) -->
      <div class="order-summary-section">
        <div class="order-summary">
          <h2 class="summary-title">주문 요약</h2>
          <div class="order-items" id="order-items">
            <!-- 주문 아이템들이 여기에 표시됩니다 -->
          </div>
          <div class="summary-rows">
            <div class="summary-row">
              <span>소계</span>
              <span id="subtotal">₩0</span>
            </div>
            <div class="summary-row">
              <span>배송</span>
              <span id="shipping">무료</span>
            </div>
            <div class="summary-row summary-total">
              <span>총계</span>
              <span id="total">₩0</span>
            </div>
          </div>
          <div class="help-section">
            <div class="help-item">
              <span>도움이 필요하세요?</span>
              <span class="chevron" aria-hidden="true">▼</span>
            </div>
            <div class="help-item">
              <span>무료 배송 및 반품</span>
              <span class="chevron" aria-hidden="true">▼</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 푸터 컨테이너 -->
  <div id="footer-container"></div>
</body>
</html>
