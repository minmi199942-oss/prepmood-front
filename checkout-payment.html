<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>결제 방법 | Pre.p Mood</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout-system.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/page.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/checkout.css">
  <script src="config.js"></script>
  <script src="https://js.tosspayments.com/v1/payment"></script>
  <script src="https://stdpay.inicis.com/stdjs/INIStdPay.js"></script>
  <script defer src="utils.js"></script>
  <script defer src="utils/checkout-utils.js"></script>
  <script defer src="catalog-data.js"></script>
  <script defer src="mini-cart.js"></script>
  <script defer src="header-loader.js"></script>
  <script defer src="header-scroll.js"></script>
  <script defer src="footer-loader.js"></script>
  <script defer src="checkout-payment.js"></script>
</head>
<body>
  <div id="header-container"></div>

  <main class="checkout-page">
    <div class="checkout-container">
      <!-- 1행: 브레드크럼 (checkout-review와 동일) -->
      <div class="checkout-breadcrumb-row">
        <nav class="checkout-breadcrumb" aria-label="결제 단계">
          <a href="checkout.html" class="step step-completed">1. 배송</a>
          <span class="separator" aria-hidden="true">&gt;</span>
          <span class="step step-current">2. 결제 방법</span>
          <span class="separator" aria-hidden="true">&gt;</span>
          <span class="step step-disabled">3. 주문 확인</span>
        </nav>
      </div>

      <!-- 좌측: 배송 정보 + 결제 정보 -->
      <div class="checkout-form-section">
        <!-- 배송 정보 (review와 동일) -->
        <div class="form-section">
          <h2 class="section-title">배송 정보</h2>
          <div id="shipping-info-payment-left">
            <!-- JavaScript로 동적 생성 -->
          </div>
          <div style="margin-top: 20px;">
            <a href="checkout.html" class="edit-link">수정</a>
          </div>
        </div>

        <!-- 결제 정보 -->
        <div class="form-section form-section-payment">
          <h2 class="section-title">결제 정보</h2>
          <div class="payment-methods-wrapper">
            <div class="payment-methods" id="payment-methods" role="radiogroup" aria-label="결제 방법 선택">
              <label class="payment-option-card" tabindex="0">
                <input type="radio" name="payment" value="toss" aria-checked="false">
                <span class="payment-card-content">
                  <span class="payment-radio" aria-hidden="true"></span>
                  <span class="payment-name">
                    <strong>토스페이먼츠</strong>
                    <span>카드 · 계좌이체 · 간편결제</span>
                  </span>
                  <span class="payment-logo">
                    <img src="image/Toss_Logo_Primary.png" alt="토스페이먼츠" width="36" height="36">
                  </span>
                </span>
              </label>
              <label class="payment-option-card" tabindex="0" title="이니시스 결제는 심사용으로 준비 중입니다">
                <input type="radio" name="payment" value="inicis" aria-checked="false">
                <span class="payment-card-content">
                  <span class="payment-radio" aria-hidden="true"></span>
                  <span class="payment-name">
                    <strong>KG이니시스</strong>
                    <span>신용카드 · 계좌이체 · 가상계좌 <span class="payment-badge">(준비 중)</span></span>
                  </span>
                  <span class="payment-logo">
                    <span class="payment-logo-text">KG이니시스</span>
                  </span>
                </span>
              </label>
            </div>
          </div>
        </div>

        <!-- 확인 및 진행 -->
        <div class="checkout-actions">
          <div id="payment-error" class="payment-error hidden"></div>
          <button class="complete-order-btn" id="proceed-payment-btn" type="button">확인 및 진행</button>
        </div>
      </div>

      <!-- 우측: 주문 요약 (checkout-review와 동일 구조) -->
      <div class="order-summary-section">
        <div class="order-summary">
          <h2 class="summary-title">주문 요약</h2>
          <div class="order-items" id="order-items" role="list">
            <!-- JavaScript로 동적 생성 -->
          </div>
          <div class="summary-rows">
            <div class="summary-row">
              <span>소계</span>
              <span id="subtotal">₩0</span>
            </div>
            <div class="summary-row">
              <span>배송</span>
              <span id="shipping">무료</span>
            </div>
            <div class="summary-row summary-total">
              <span>총계</span>
              <span id="total">₩0</span>
            </div>
          </div>
          <div class="help-section">
            <div class="help-item">
              <span>도움이 필요하세요?</span>
              <span class="chevron" aria-hidden="true">▼</span>
            </div>
            <div class="help-item">
              <span>무료 배송 및 반품</span>
              <span class="chevron" aria-hidden="true">▼</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>
</body>
</html>
