<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 - Pre.p Mood</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/layout-system.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/page.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/login.css">
  <style>
    /* QR 인증 안내 배너 */
    .qr-auth-notice {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      animation: slideIn 0.3s ease-out;
      position: relative;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .qr-auth-notice .notice-icon {
      font-size: 28px;
      flex-shrink: 0;
      line-height: 1;
    }

    .qr-auth-notice .notice-content {
      flex: 1;
    }

    .qr-auth-notice .notice-title {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 4px 0;
      color: white;
      line-height: 1.4;
    }

    .qr-auth-notice .notice-text {
      font-size: 13px;
      margin: 0;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.5;
    }

    .qr-auth-notice .notice-close {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      padding: 0;
    }

    .qr-auth-notice .notice-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 480px) {
      .qr-auth-notice {
        padding: 14px 16px;
        gap: 12px;
      }
      
      .qr-auth-notice .notice-icon {
        font-size: 24px;
      }
      
      .qr-auth-notice .notice-title {
        font-size: 14px;
      }
      
      .qr-auth-notice .notice-text {
        font-size: 12px;
      }
      
      .qr-auth-notice .notice-close {
        width: 20px;
        height: 20px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- 공통 헤더 -->
  <div id="header-container"></div>

  <div class="login-container">
    <main class="login-main">
      <div class="login-box">
      <!-- ✅ QR 인증 안내 배너 (조건부 표시) -->
      <div id="qr-auth-notice" class="qr-auth-notice" style="display: none;">
        <div class="notice-icon">🔐</div>
        <div class="notice-content">
          <h3 class="notice-title">정품 인증을 위해 로그인이 필요합니다.</h3>
          <p class="notice-text">로그인 후 인증 페이지로 이동합니다.</p>
        </div>
        <button class="notice-close" id="closeQrNotice" aria-label="닫기">×</button>
      </div>
      
      <div class="login-header">
        <h1>로그인</h1>
        <p class="return-to-hint" id="returnToHint" style="display: none; margin-top: 0.5rem; font-size: 0.9rem; color: #666;">로그인하시면 주문 페이지로 돌아갑니다.</p>
      </div>

      <!-- 이메일/비밀번호 로그인 -->
        <form class="login-form" id="loginForm">
          <div class="input-group">
            <label for="email">이메일 *</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="input-group">
            <label for="password">비밀번호 *</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
            <a href="#" class="forgot-password">비밀번호 찾기</a>
          </div>

          <button type="submit" class="login-btn" id="loginBtn" disabled>
            로그인          </button>
        </form>

        <div class="divider">또는</div>

        <!-- 소셜 로그인 버튼들 -->
        <div class="social-login-container">
          <button class="social-login-btn google-login-btn" id="googleLoginBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google로 계속하기
          </button>
          
          <button class="social-login-btn apple-login-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            Apple로 계속하기
          </button>
        </div>

        <div class="privacy-link-wrapper">
          <a href="privacy.html" class="privacy-link">개인정보 처리방침</a>
        </div>

        <!-- 회원가입 영역 -->
        <div class="signup-area">
          <p class="signup-text">새로운 신규 고객이신가요?</p>
          <p class="signup-hint"><span class="signup-hint-icon" aria-hidden="true">→</span> 디지털 인보이스 및 보증서 관리를 위해 계정을 생성하세요.</p>
          <button type="button" id="create-account-btn" class="create-account-btn">
            계정 만들기
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Google Identity Services 라이브러리 로드 -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="utils.js" defer></script>
  <script src="header-loader.js"></script>
  <script src="header-scroll.js"></script>
  <script src="footer-loader.js"></script>
  
  <!-- 에러 핸들링 -->
  <script>
    window.addEventListener('error', (e) => {
      // 프로덕션에서는 에러 로그만 출력
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        return;
      }
      console.error('[ERROR]', e.message, e.filename, e.lineno);
    });
  </script>
  
  <script>
    const API_BASE = (window.API_BASE)
      ? window.API_BASE
      : ((window.location && window.location.origin)
          ? window.location.origin.replace(/\/$/, '') + '/api'
          : '/api');

    // Google OAuth 설정
    const GOOGLE_CLIENT_ID = '496755897469-23ftq4affabq1jegpuph6oer7jes5a5s.apps.googleusercontent.com';
    
    // Google 로그인 콜백 함수 (기존 Google Sign-In 버튼용)
    async function handleGoogleSignIn(response) {
      // DOMContentLoaded 내부의 returnTo를 사용하기 위해 별도 함수로 분리
      // 이 함수는 initializeGoogleSignIn에서 사용됨 (기존 Google Sign-In 버튼용)
      await handleGoogleSignInWithReturnTo(response, null);
    }
    
    // ✅ returnTo를 포함한 Google 로그인 처리 함수
    async function handleGoogleSignInWithReturnTo(response, returnToParam) {
      try {
        Logger.log('Google 로그인 토큰 수신:', response.credential);
        
        // Google ID 토큰을 백엔드로 전송
        const backendResponse = await fetch(`${API_BASE}/auth/google/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({ 
            idToken: response.credential,
            returnTo: returnToParam || null  // ✅ returnTo 포함
          })
        });

        // 429 오류인 경우 별도 처리
        if (backendResponse.status === 429) {
          Logger.log('⚠️ Rate Limiting 감지 - 서버 과부하 상태');
          alert('서버가 일시적으로 과부하 상태입니다.\n\n잠시 후 다시 시도해주세요.\n또는 일반 로그인을 이용해주세요.');
          return;
        }

        const data = await backendResponse.json();
        Logger.log('백엔드 응답:', data);

        if (data.success) {
          // JWT 토큰은 httpOnly 쿠키로 자동 설정됨
          // 최소한의 정보만 sessionStorage에 저장 (환영 메시지용)
          sessionStorage.setItem('userName', data.user.name);
          
          // ⚠️ 비회원 장바구니 서버 동기화 (Google 로그인 시 자동 마이그레이션)
          if (window.miniCart && typeof window.miniCart.syncGuestCartToServer === 'function') {
            try {
              const syncResult = await window.miniCart.syncGuestCartToServer();
              if (syncResult && syncResult.synced > 0) {
                if (syncResult.success) {
                  Logger.log(`✅ 비회원 장바구니 동기화 완료: ${syncResult.synced}개 상품이 서버 장바구니로 이동되었습니다.`);
                } else {
                  Logger.warn(`⚠️ 비회원 장바구니 부분 동기화: ${syncResult.synced}/${syncResult.total}개 성공. 실패한 상품은 localStorage에 보존됩니다.`);
                  if (syncResult.failed && syncResult.failed.length > 0) {
                    Logger.warn('동기화 실패 상품:', syncResult.failed);
                  }
                }
              }
            } catch (syncError) {
              Logger.error('❌ 비회원 장바구니 동기화 중 오류:', syncError);
              // 동기화 실패해도 로그인은 계속 진행
            }
          } else {
            // ⚠️ window.miniCart가 없을 때: 다음 페이지에서 동기화하도록 플래그 설정
            const guestCart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
            if (guestCart.length > 0) {
              sessionStorage.setItem('guest_cart_sync_pending', '1');
              Logger.log('⚠️ miniCart가 없어 다음 페이지에서 장바구니 동기화 예정');
            }
          }
          
          if (data.needsAdditionalInfo) {
            alert(`환영합니다! ${data.user.name}님, 추가 정보를 입력해주세요.`);
            window.location.href = 'complete-profile.html';
          } else {
            alert(`Google 로그인 성공! 환영합니다! ${data.user.name}님`);
            // ✅ 서버가 검증해서 내려준 redirectTo만 사용 (절대 URL 파라미터 직접 사용 안 함)
            window.location.href = data.redirectTo || 'index.html';
          }
        } else {
          alert(data.error || 'Google 로그인에 실패했습니다.');
        }
      } catch (error) {
        console.error('Google 로그인 오류:', error);
        if (error.message.includes('429') || error.message.includes('Too Many Requests')) {
          alert('서버가 일시적으로 과부하 상태입니다.\n\n잠시 후 다시 시도해주세요.\n또는 일반 로그인을 이용해주세요.');
        } else {
          alert('Google 로그인 처리 중 오류가 발생했습니다.\n\n일반 로그인을 이용해주세요.');
        }
      }
    }
    
    // Google Sign-In 초기화
    function initializeGoogleSignIn() {
      if (typeof google !== 'undefined' && google.accounts) {
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleGoogleSignIn
        });
      }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      // ✅ returnTo를 페이지 로드 시 읽어서 스코프 유지
      const urlParams = new URLSearchParams(window.location.search);
      const returnTo = urlParams.get('returnTo');  // 페이지 파라미터 기반이면 자연스럽게 유지됨
      const reason = urlParams.get('reason'); // ✅ reason 파라미터 확인

      // 등록하기 → 로그인 경로: 주문 페이지 복귀 안내
      if (returnTo && returnTo.indexOf('/guest/') === 0) {
        var returnToHint = document.getElementById('returnToHint');
        if (returnToHint) returnToHint.style.display = 'block';
      }
      
      // ✅ QR 인증 안내 배너 표시 로직
      const qrAuthNotice = document.getElementById('qr-auth-notice');
      const closeQrNotice = document.getElementById('closeQrNotice');
      
      if (reason === 'qr_auth' && qrAuthNotice) {
        // reason=qr_auth일 때만 배너 표시
        qrAuthNotice.style.display = 'flex';
        
        // 닫기 버튼 클릭 시 배너 숨김 및 URL에서 reason만 제거 (returnTo 유지)
        if (closeQrNotice) {
          closeQrNotice.addEventListener('click', function() {
            qrAuthNotice.style.display = 'none';
            
            // ✅ 옵션 A: URL에서 reason만 제거, returnTo는 유지
            const newParams = new URLSearchParams(window.location.search);
            newParams.delete('reason');
            const newUrl = window.location.pathname + 
                (newParams.toString() ? '?' + newParams.toString() : '');
            history.replaceState(null, '', newUrl);
          });
        }
      } else if (qrAuthNotice) {
        // 일반 로그인 페이지면 배너 숨김
        qrAuthNotice.style.display = 'none';
      }
      
      const loginForm = document.getElementById('loginForm');
      const loginBtn = document.getElementById('loginBtn');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');

      // 계정 만들기: returnTo가 있으면 회원가입 후 다시 로그인 시 주문 상세로 복귀되도록 전달
      const createAccountBtn = document.getElementById('create-account-btn');
      if (createAccountBtn) {
        createAccountBtn.addEventListener('click', function() {
          const goTo = returnTo
            ? ('register.html?returnTo=' + encodeURIComponent(returnTo))
            : 'register.html';
          window.location.href = goTo;
        });
      }

      // Google Identity Services 초기화
      if (typeof google !== 'undefined') {
        initializeGoogleSignIn();
      } else {
        window.addEventListener('load', initializeGoogleSignIn);
      }

      // Google 로그인 버튼 클릭 이벤트 (개선된 팝업 방식)
      document.getElementById('googleLoginBtn').addEventListener('click', function() {
        // 현재 URL이 127.0.0.1이면 localhost로 리디렉션
        if (window.location.hostname === '127.0.0.1') {
          window.location.href = window.location.href.replace('127.0.0.1', 'localhost');
          return;
        }
        
        const width = 500;
        const height = 600;
        const left = (window.screen.width / 2) - (width / 2);
        const top = (window.screen.height / 2) - (height / 2);
        
        // 현재 origin을 확인하여 사용
        const currentOrigin = window.location.origin;
        const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
          `client_id=${GOOGLE_CLIENT_ID}&` +
          `redirect_uri=${encodeURIComponent(currentOrigin + '/google-callback.html')}&` +
          `response_type=token id_token&` +
          `scope=openid email profile&` +
          `nonce=random_nonce_${Date.now()}`;
        
        Logger.log('Auth URL:', authUrl);
        
        const popup = window.open(
          authUrl,
          'Google 로그인',
          `width=${width},height=${height},top=${top},left=${left},scrollbars=yes,resizable=yes`
        );
        
        if (!popup) {
          alert('팝업이 차단되었습니다. 팝업 차단을 해제해주세요.');
          return;
        }
        
        // 팝업에서 메시지 수신
        const messageHandler = async function(event) {
          if (event.origin !== currentOrigin) return;
          
          if (event.data.type === 'GOOGLE_AUTH_SUCCESS') {
            // 팝업 닫기 (오류 무시)
            try {
              popup.close();
            } catch (e) {
              // Cross-Origin-Opener-Policy 오류 무시
              Logger.log('팝업 닫기 오류 무시:', e.message);
            }
            // ✅ returnTo를 스코프에서 접근 가능하도록 클로저 사용
            handleGoogleSignInWithReturnTo({ credential: event.data.idToken }, returnTo);
            window.removeEventListener('message', messageHandler);
          } else if (event.data.type === 'GOOGLE_AUTH_ERROR') {
            // 팝업 닫기 (오류 무시)
            try {
              popup.close();
            } catch (e) {
              Logger.log('팝업 닫기 오류 무시:', e.message);
            }
            alert('Google 로그인에 실패했습니다: ' + event.data.error);
            window.removeEventListener('message', messageHandler);
          }
        };
        
        window.addEventListener('message', messageHandler);
        
        // 팝업이 닫혔는지 확인 (Cross-Origin-Opener-Policy 오류 처리)
        const checkClosed = setInterval(() => {
          try {
            if (popup.closed) {
              clearInterval(checkClosed);
              window.removeEventListener('message', messageHandler);
            }
          } catch (e) {
            // Cross-Origin-Opener-Policy 오류 무시
            Logger.log('팝업 상태 확인 오류 무시:', e.message);
            // 5초 후 자동으로 정리
            setTimeout(() => {
              clearInterval(checkClosed);
              window.removeEventListener('message', messageHandler);
            }, 5000);
          }
        }, 1000);
        
        // 30초 후 자동 정리 (타임아웃)
        setTimeout(() => {
          try {
            clearInterval(checkClosed);
            window.removeEventListener('message', messageHandler);
            if (!popup.closed) {
              popup.close();
            }
          } catch (e) {
            Logger.log('타임아웃 정리 오류 무시:', e.message);
          }
        }, 30000);
      });

      // 로그인 버튼 활성화/비활성화
      function updateLoginButton() {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const isFormValid = email && password;
        
        loginBtn.disabled = !isFormValid;
        
        // CSS 클래스 추가/제거
        if (isFormValid) {
          loginBtn.classList.add('active');
        } else {
          loginBtn.classList.remove('active');
        }
      }

      emailInput.addEventListener('input', updateLoginButton);
      passwordInput.addEventListener('input', updateLoginButton);
      
      // 페이지 로드 시 초기 상태 설정
      updateLoginButton();

      // 로그인 폼 제출
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          alert('이메일과 비밀번호를 입력해주세요.');
          return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = '로그인 중...';

        try {
          const response = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            credentials: 'include', // JWT 쿠키 받기 위해 필요!
            body: JSON.stringify({ 
              email, 
              password,
              returnTo: returnTo || null  // ✅ returnTo 포함
            })
          });

          const data = await response.json();

          if (data.success) {
            // 로그인 성공
            alert(`로그인 성공! 환영합니다! ${data.user.name}님`);
            
            // JWT 토큰은 httpOnly 쿠키로 자동 설정됨 (localStorage 사용 안함)
            // 최소한의 정보만 sessionStorage에 저장 (환영 메시지용)
            sessionStorage.setItem('userName', data.user.name);
            
            // ⚠️ 비회원 장바구니 서버 동기화 (로그인 시 자동 마이그레이션)
            if (window.miniCart && typeof window.miniCart.syncGuestCartToServer === 'function') {
              try {
                const syncResult = await window.miniCart.syncGuestCartToServer();
                if (syncResult && syncResult.synced > 0) {
                  if (syncResult.success) {
                    Logger.log(`✅ 비회원 장바구니 동기화 완료: ${syncResult.synced}개 상품이 서버 장바구니로 이동되었습니다.`);
                  } else {
                    Logger.warn(`⚠️ 비회원 장바구니 부분 동기화: ${syncResult.synced}/${syncResult.total}개 성공. 실패한 상품은 localStorage에 보존됩니다.`);
                    if (syncResult.failed && syncResult.failed.length > 0) {
                      Logger.warn('동기화 실패 상품:', syncResult.failed);
                    }
                  }
                }
              } catch (syncError) {
                Logger.error('❌ 비회원 장바구니 동기화 중 오류:', syncError);
                // 동기화 실패해도 로그인은 계속 진행
              }
            } else {
              // ⚠️ window.miniCart가 없을 때: 다음 페이지에서 동기화하도록 플래그 설정
              const guestCart = JSON.parse(localStorage.getItem('guest_cart') || '[]');
              if (guestCart.length > 0) {
                sessionStorage.setItem('guest_cart_sync_pending', '1');
                Logger.log('⚠️ miniCart가 없어 다음 페이지에서 장바구니 동기화 예정');
              }
            }
            
            // ✅ 서버가 검증해서 내려준 redirectTo만 사용 (절대 URL 파라미터 직접 사용 안 함)
            const finalRedirect = data.redirectTo || 'index.html';
            window.location.href = finalRedirect;
          } else {
            // 로그인 실패
            alert(data.message || '로그인에 실패했습니다.');
          }
        } catch (error) {
          console.error('로그인 오류:', error);
          alert('네트워크 오류가 발생했습니다. 다시 시도해주세요.');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = '로그인';
        }
      });

      // Enter 키로 로그인
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !loginBtn.disabled) {
          loginForm.dispatchEvent(new Event('submit'));
        }
      });

      // Apple 로그인 버튼 이벤트
      document.querySelector('.apple-login-btn').addEventListener('click', function() {
        // Apple 로그인 로직 (현재 구현 안됨 - Apple Sign In API 사용)
        alert('Apple 로그인 기능은 준비중입니다.');
        Logger.log('Apple 로그인 클릭');
      });

    });
  </script>

  <!-- 푸터 컨테이너 -->
  <div id="footer-container"></div>
</body>
</html>
