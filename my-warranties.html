<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 보증서 - Pre.p Mood</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/layout-system.css">
    <link rel="stylesheet" href="/assets/css/header.css">
    <link rel="stylesheet" href="/assets/css/page.css">
    <link rel="stylesheet" href="/assets/css/responsive.css">
    <script defer src="/utils.js"></script>
    <script defer src="/header-loader.js"></script>
    <script defer src="/header-scroll.js"></script>
    <script defer src="/footer-loader.js"></script>
    <script defer src="/my-warranties.js"></script>
</head>
<body>
    <!-- 헤더 컨테이너 -->
    <div id="header-container"></div>

    <!-- 메인 컨텐츠 -->
    <main class="my-warranties-main">
        <!-- 로고 섹션 -->
        <div class="logo-section">
            <img src="/image/prepmoodlogo.jpg" alt="Pre.p Mood" class="main-logo">
        </div>

        <!-- 메인 레이아웃 -->
        <div class="main-layout">
            <!-- 좌측 사이드바 -->
            <aside class="sidebar">
                <div class="sidebar-content">
                    <!-- 사용자 환영 메시지 -->
                    <div class="user-welcome">
                        <h2 id="user-welcome-text">님 환영합니다.</h2>
                    </div>

                    <!-- 네비게이션 메뉴 -->
                    <nav class="sidebar-nav">
                        <a href="/my-orders.html" class="nav-item" data-page="orders">
                            <span>내 주문</span>
                            <div class="nav-underline"></div>
                        </a>
                        <a href="/my-reservations.html" class="nav-item" data-page="reservations">
                            <span>예약</span>
                            <div class="nav-underline"></div>
                        </a>
                        <a href="/my-warranties.html" class="nav-item active" data-page="warranties">
                            <span>내 보증서</span>
                            <div class="nav-underline"></div>
                        </a>
                        <a href="/my-profile.html" class="nav-item" data-page="profile">
                            <span>내 프로필</span>
                            <div class="nav-underline"></div>
                        </a>
                    </nav>
                </div>
            </aside>

            <!-- 우측 메인 영역 -->
            <section class="main-content">
                <div class="content-container">
                    <!-- 페이지 제목 -->
                    <div class="page-header">
                        <h1 class="page-title">내 보증서</h1>
                        <p class="page-subtitle">발급받은 디지털 보증서 목록</p>
                        <p class="page-english">Warranties</p>
                    </div>

                    <!-- 보증서 목록 영역 -->
                    <div class="warranties-section">
                        <!-- 보증서 목록이 있는 경우 -->
                        <div id="warranties-list" class="warranties-list" style="display: none;">
                            <!-- JavaScript로 동적 생성 -->
                        </div>

                        <!-- 보증서 목록이 없는 경우 -->
                        <div id="no-warranties" class="no-warranties">
                            <div class="no-warranties-content">
                                <h2 class="no-warranties-title">발급받은 보증서가 없습니다.</h2>
                                <p class="no-warranties-subtitle">제품 QR 코드를 스캔하여 보증서를 발급받으세요.</p>
                            </div>
                        </div>

                        <!-- 로딩 상태 -->
                        <div id="loading-warranties" class="loading-warranties" style="display: none;">
                            <p>보증서 목록을 불러오는 중...</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 보증서 활성화 경고 모달 (문서 4.3, 11절 2단계) -->
    <div id="activate-warranty-modal" class="activate-warranty-modal" role="dialog" aria-labelledby="activate-modal-title" aria-modal="true" style="display: none;">
        <div class="activate-warranty-modal-backdrop"></div>
        <div class="activate-warranty-modal-content">
            <div class="activate-warranty-modal-header">
                <h2 id="activate-modal-title">보증서 활성화 안내</h2>
                <button type="button" class="activate-warranty-modal-close" id="activate-modal-close" aria-label="닫기">&times;</button>
            </div>
            <div class="activate-warranty-modal-body">
                <p class="activate-warranty-notice">보증서 미활성 상태에서만 전자상거래법에 따른 청약철회가 가능합니다.</p>
                <p class="activate-warranty-notice">보증서를 활성화하면 해당 상품은 사용 개시로 간주되어 새 상품으로 재판매가 불가능합니다. 이에 따라 교환 및 환불이 제한됩니다.</p>
                <p class="activate-warranty-notice activate-warranty-notice-sub">활성화된 보증서는 양도 및 환불 정책이 적용됩니다.</p>
                <p class="activate-warranty-check-wrap">
                    <label>
                        <input type="checkbox" id="activate-warranty-agree" />
                        <span>위 내용을 확인했으며 동의합니다.</span>
                    </label>
                </p>
            </div>
            <div class="activate-warranty-modal-footer">
                <button type="button" class="btn-activate-modal-cancel" id="activate-modal-cancel">취소</button>
                <button type="button" class="btn-activate-modal-confirm" id="activate-modal-confirm" disabled>활성화</button>
            </div>
        </div>
    </div>
    <style>
        .activate-warranty-modal { position: fixed; inset: 0; z-index: 9999; overflow: auto; }
        .activate-warranty-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); }
        .activate-warranty-modal-content { position: relative; max-width: 480px; margin: 2rem auto; padding: 0; background: #fff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .activate-warranty-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #eee; }
        .activate-warranty-modal-header h2 { margin: 0; font-size: 1.125rem; font-weight: 600; }
        .activate-warranty-modal-close { background: none; border: none; font-size: 1.5rem; line-height: 1; cursor: pointer; color: #666; padding: 0 0.25rem; }
        .activate-warranty-modal-close:hover { color: #000; }
        .activate-warranty-modal-body { padding: 1.25rem; }
        .activate-warranty-notice { margin: 0 0 0.75rem; font-size: 0.9375rem; line-height: 1.5; color: #333; }
        .activate-warranty-notice-sub { margin-bottom: 1rem; color: #666; }
        .activate-warranty-check-wrap { margin: 1rem 0 0; }
        .activate-warranty-check-wrap label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9375rem; }
        .activate-warranty-modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; padding: 1rem 1.25rem; border-top: 1px solid #eee; }
        .btn-activate-modal-cancel, .btn-activate-modal-confirm { padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.9375rem; cursor: pointer; }
        .btn-activate-modal-cancel { background: #f0f0f0; border: 1px solid #ddd; color: #333; }
        .btn-activate-modal-cancel:hover { background: #e5e5e5; }
        .btn-activate-modal-confirm { background: #333; border: 1px solid #333; color: #fff; }
        .btn-activate-modal-confirm:hover:not(:disabled) { background: #000; }
        .btn-activate-modal-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>

    <!-- 푸터 컨테이너 -->
    <div id="footer-container"></div>
</body>
</html>
